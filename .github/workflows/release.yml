name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
      - "[0-9]+.[0-9]+.[0-9]+-*"

permissions:
  contents: write
  attestations: write
  id-token: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Detect prerelease
        id: release_type
        shell: bash
        run: |
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        run: npm ci

      - name: Sync version metadata
        shell: bash
        run: |
          npm version "${{ github.ref_name }}" --no-git-tag-version --allow-same-version
          npm run version "${{ github.ref_name }}"

      - name: Build
        run: npm run build

      - name: Use beta manifest for prerelease
        if: steps.release_type.outputs.prerelease == 'true'
        shell: bash
        run: |
          if [[ -f manifest-beta.json ]]; then
            cp manifest-beta.json manifest.json
          fi

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          PRERELEASE: ${{ steps.release_type.outputs.prerelease }}
        shell: bash
        run: |
          args=("$TAG" --title "$TAG" --generate-notes)
          if [[ "$PRERELEASE" == "true" ]]; then
            args+=(--prerelease)
          fi
          gh release create "${args[@]}" main.js manifest.json styles.css
